name: dashboard_pwa
description: SaaS dashboard for WhatsApp bot configuration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.7
  geolocator: ^13.0.2
  google_fonts: ^6.2.1
  http: ^1.2.2
  http_parser: ^4.1.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/images/logoprincioak.png
    background_color: "#ffffff"
    theme_color: "#0F172A"
  image_path: "assets/images/logoprincioak.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logoprincioak.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logoprincioak.png