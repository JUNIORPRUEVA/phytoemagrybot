version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phytoemagrybot-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/phytoemagrybot?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3000:3000'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: phytoemagrybot-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: phytoemagrybot-postgres
    environment:
      POSTGRES_DB: phytoemagrybot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d phytoemagrybot']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: