version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: phytoemagrybot-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      # IMPORTANT: This must point to your CLOUD PostgreSQL.
      # Provide it via host env vars or `docker compose --env-file ...`.
      DATABASE_URL: ${DATABASE_URL?DATABASE_URL is required (cloud postgres url)}
      # IMPORTANT: This must point to your CLOUD Redis.
      # Example: rediss://default:password@your-redis-host:6380
      REDIS_URL: ${REDIS_URL?REDIS_URL is required (cloud redis url)}
    ports:
      - '3000:3000'
    restart: unless-stopped
